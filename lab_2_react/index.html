<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lab_2_react</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="contactModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border:2px solid #333; box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 1000;">
      <h2 style="text-align: center;">Зворотній зв'язок</h2>
      <form action="https://formspree.io/f/xbdqnenz" method="POST">
          <p><label>Ім'я:<br> <input type="text" name="name" required></label></p>
          <p><label>Email:<br> <input type="email" name="email" required></label></p>
          <p><label>Телефон:<br> <input type="tel" name="phone" required></label></p>
          <p><label>Повідомлення:<br> <textarea name="message" required></textarea></label></p>
          
          <button type="submit">Відправити</button>
          <button type="button" onclick="document.getElementById('contactModal').style.display='none'">Закрити</button>
      </form>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      setTimeout(() => {
          document.getElementById('contactModal').style.display = 'block';
      }, 60000);

      document.addEventListener('click', function() {
        const button = event.target.closest('#themeToggle');

        if (button) {
          document.documentElement.classList.toggle('dark');
        }
      });

      const currentHour = new Date().getHours();
    
      if (currentHour >= 7 && currentHour < 21) {
          document.documentElement.classList.remove('dark');
      } else {
          document.documentElement.classList.add('dark');
      }
    </script>
  </body>
</html>
